    let groups = [];
    let currentGroupId = null;

    function createGroup(itemId) {
      const item = items.find(i => i.assetId === itemId || i.id === itemId);
      if (!item) return;

      if (!item.groupId) {
        const groupId = 'group_' + Date.now();
        const groupName = '分组' + (groups.length + 1);
        
        item.groupId = groupId;
        item.groupName = groupName;
        
        groups.push({ id: groupId, name: groupName, itemIds: [itemId] });
        
        if (!item.cardTags) item.cardTags = [];
        item.cardTags.push(groupName);
        
        renderTags(item);
        scheduleSave();
        alert('已创建分组: ' + groupName);
      } else {
        alert('该卡片已在分组中');
      }
    }

    function removeFromGroup(itemId) {
      const item = items.find(i => i.assetId === itemId || i.id === itemId);
      if (!item || !item.groupId) return;

      const group = groups.find(g => g.id === item.groupId);
      if (group) {
        group.itemIds = group.itemIds.filter(id => id !== itemId);
        if (group.itemIds.length === 0) {
          groups = groups.filter(g => g.id !== group.id);
        }
      }

      const groupName = item.groupName;
      item.groupId = null;
      item.groupName = null;

      if (item.cardTags) {
        item.cardTags = item.cardTags.filter(t => t !== groupName);
      }

      renderTags(item);
      scheduleSave();
      alert('已从分组移除');
    }

    function addSelectedToGroup() {
      if (selectedItems.size === 0) {
        alert('请先选择卡片');
        return;
      }

      const existingGroup = prompt('请输入分组名称（留空则创建新分组）：');
      let groupId, groupName;

      if (existingGroup && existingGroup.trim()) {
        const existing = groups.find(g => g.name === existingGroup.trim());
        if (existing) {
          groupId = existing.id;
          groupName = existing.name;
        } else {
          groupId = 'group_' + Date.now();
          groupName = existingGroup.trim();
          groups.push({ id: groupId, name: groupName, itemIds: [] });
        }
      } else {
        groupId = 'group_' + Date.now();
        groupName = '分组' + (groups.length + 1);
        groups.push({ id: groupId, name: groupName, itemIds: [] });
      }

      selectedItems.forEach(el => {
        const itemId = el.dataset.id || el.dataset.assetId;
        const item = items.find(i => i.assetId === itemId || i.id === itemId);
        if (item && !item.groupId) {
          item.groupId = groupId;
          item.groupName = groupName;
          groups.find(g => g.id === groupId).itemIds.push(itemId);
          
          if (!item.cardTags) item.cardTags = [];
          if (!item.cardTags.includes(groupName)) {
            item.cardTags.push(groupName);
          }
        }
      });

      scheduleSave();
      alert('已添加到分组: ' + groupName);
      updateGroupBoxes();
    }

    function getTagColor(tag) {
      if (tag.startsWith('分组')) {
        const idx = parseInt(tag.replace('分组', '')) || 1;
        const colors = ['#4a90d9', '#e91e63', '#4caf50', '#ff9800', '#9c27b0'];
        return colors[(idx - 1) % colors.length];
      }
      let hash = 0;
      for (let i = 0; i < tag.length; i++) {
        hash = tag.charCodeAt(i) + ((hash << 5) - hash);
      }
      return '#4a90d9';
    }

    function updateGroupBoxes() {
      document.querySelectorAll('.group-box').forEach(el => el.remove());

      const allTags = new Set();
      items.forEach(item => {
        (item.cardTags || []).forEach(tag => allTags.add(tag));
      });

      allTags.forEach(tag => {
        const tagItems = items.filter(i => (i.cardTags || []).includes(tag));
        if (tagItems.length === 0) return;

        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

        tagItems.forEach(item => {
          if (item.x !== undefined && item.y !== undefined) {
            minX = Math.min(minX, item.x);
            minY = Math.min(minY, item.y);
            maxX = Math.max(maxX, item.x + (item.width || 120));
            maxY = Math.max(maxY, item.y + (item.height || 120));
          }
        });

        if (minX === Infinity) return;

        const padding = 20;
        const box = document.createElement('div');
        box.className = 'group-box';
        box.style.left = (minX - padding) + 'px';
        box.style.top = (minY - padding) + 'px';
        box.style.width = (maxX - minX + padding * 2) + 'px';
        box.style.height = (maxY - minY + padding * 2) + 'px';
        box.style.borderColor = getTagColor(tag);
        box.style.backgroundColor = getTagColor(tag) + '15';

        const label = document.createElement('div');
        label.className = 'group-box-label';
        label.textContent = tag;
        label.style.backgroundColor = getTagColor(tag);
        box.appendChild(label);

        whiteboard.appendChild(box);
      });
    }

    let lastPanX = 0, lastPanY = 0;
    setInterval(() => {
      if (panX !== lastPanX || panY !== lastPanY) {
        lastPanX = panX;
        lastPanY = panY;
        updateGroupBoxes();
      }
    }, 100);

    const originalUpdateTransform = updateTransform;
    updateTransform = function() {
      originalUpdateTransform();
      updateGroupBoxes();
    };

    init();
  </script>
</body>
</html>

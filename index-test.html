<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test</title>
</head>
<body>
    <h1>Hello World</h1>
    <script>
        console.log('Renderer process running');
        // Test if the API is available
        if (window.whiteboardAPI) {
            console.log('whiteboardAPI is available');
            window.whiteboardAPI.getDataPath().then(path => {
                console.log('Data path:', path);
            }).catch(err => {
                console.error('Error getting data path:', err);
            });
        } else {
            console.error('whiteboardAPI not available');
        }
    </script>
</body>
</html>
